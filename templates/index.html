<!DOCTYPE html>
<html lang="en">

<head>

<title>Abalone Age Prediction System</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
font-family:'Poppins',sans-serif;
}

body{

background: linear-gradient(-45deg,#ff6a00,#ee0979,#00c6ff,#0072ff,#00ff88);
background-size:400% 400%;
animation: gradientBG 12s ease infinite;
min-height:100vh;
overflow-x:hidden;
}

@keyframes gradientBG{

0%{background-position:0% 50%}

50%{background-position:100% 50%}

100%{background-position:0% 50%}

}

.navbar{
background: rgba(0,0,0,0.25);
backdrop-filter: blur(12px);
}

.navbar-brand{
font-weight:600;
color:white !important;
font-size:20px;
letter-spacing:1px;
}

.main-container{
margin-top:60px;
}

.card{

background: rgba(255,255,255,0.12);
backdrop-filter: blur(18px);
border-radius:20px;
padding:35px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
color:white;
transition:0.4s;
border:1px solid rgba(255,255,255,0.2);
}

.card:hover{

transform:translateY(-8px) scale(1.01);
box-shadow:0 25px 50px rgba(0,0,0,0.5);

}

h2{
font-weight:600;
margin-bottom:10px;
}

.description{

font-size:14px;
opacity:0.9;
margin-bottom:25px;
}

label{
font-weight:500;
margin-bottom:5px;
}

.form-control, .form-select{

border-radius:12px;
border:none;
padding:12px;
transition:0.3s;
}

.form-control:hover{

transform:scale(1.02);
}

.form-control:focus{

box-shadow:0 0 15px rgba(255,255,255,0.8);
transform:scale(1.04);

}

.input-group-text{

background:rgba(255,255,255,0.2);
border:none;
color:white;
}

.btn-predict{

background: linear-gradient(90deg,#ff6a00,#ee0979,#00c6ff);
background-size:200%;
border:none;
padding:13px 35px;
font-size:18px;
border-radius:40px;
transition:0.4s;
color:white;
font-weight:600;
letter-spacing:1px;
}

.btn-predict:hover{

background-position:right;
transform:scale(1.08);
box-shadow:0 10px 25px rgba(0,0,0,0.4);

}

.result{

margin-top:25px;
padding:18px;
border-radius:15px;
background:linear-gradient(135deg,#00ffcc,#00c6ff,#0072ff);
font-size:22px;
font-weight:600;
text-align:center;
animation:fadeIn 1s ease;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

@keyframes fadeIn{

from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}

}

.footer{

text-align:center;
color:white;
margin-top:40px;
font-size:14px;
opacity:0.85;
}

/* Floating Particles */

.particle{

position:absolute;
width:8px;
height:8px;
background:white;
border-radius:50%;
opacity:0.5;
animation:float 15s infinite linear;

}

@keyframes float{

from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}

}

</style>

</head>

<body>

<!-- Floating particles -->
<div class="particle" style="left:10%; animation-delay:0s"></div>
<div class="particle" style="left:20%; animation-delay:2s"></div>
<div class="particle" style="left:40%; animation-delay:4s"></div>
<div class="particle" style="left:60%; animation-delay:1s"></div>
<div class="particle" style="left:80%; animation-delay:3s"></div>

<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand" href="#">
<i class="fa-solid fa-brain"></i> ML Prediction System
</a>
</div>
</nav>

<div class="container main-container">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card">

<h2 class="text-center">
<i class="fa-solid fa-shellfish"></i>
Abalone Age Prediction
</h2>

<p class="text-center description">
Enter the physical characteristics of the abalone shell to estimate its age using a trained Machine Learning model.
</p>

<form action="/predict" method="post">

<div class="row">

<div class="col-md-4">
<label>Sex</label>
<select name="Sex" class="form-select">
<option value="0">Male</option>
<option value="1">Female</option>
<option value="2">Infant</option>
</select>
</div>

<div class="col-md-4">
<label>Length</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-ruler-horizontal"></i></span>
<input type="number" step="any" name="Length" class="form-control" required>
</div>
</div>

<div class="col-md-4">
<label>Diameter</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-ruler"></i></span>
<input type="number" step="any" name="Diameter" class="form-control" required>
</div>
</div>

</div>

<br>

<div class="row">

<div class="col-md-4">
<label>Height</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-arrows-up-down"></i></span>
<input type="number" step="any" name="Height" class="form-control" required>
</div>
</div>

<div class="col-md-4">
<label>Whole Weight</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-weight-scale"></i></span>
<input type="number" step="any" name="Whole_weight" class="form-control" required>
</div>
</div>

<div class="col-md-4">
<label>Shucked Weight</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-weight-hanging"></i></span>
<input type="number" step="any" name="Shucked_weight" class="form-control" required>
</div>
</div>

</div>

<br>

<div class="row">

<div class="col-md-6">
<label>Viscera Weight</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-weight-scale"></i></span>
<input type="number" step="any" name="Viscera_weight" class="form-control" required>
</div>
</div>

<div class="col-md-6">
<label>Shell Weight</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-weight-scale"></i></span>
<input type="number" step="any" name="Shell_weight" class="form-control" required>
</div>
</div>

</div>

<br>

<div class="text-center">

<button type="submit" class="btn btn-predict">
<i class="fa-solid fa-chart-line"></i> Predict Age
</button>

</div>

</form>

{% if prediction_text %}

<div class="result">
<i class="fa-solid fa-chart-bar"></i>
{{ prediction_text }}
</div>

{% endif %}

</div>

</div>

</div>

</div>

<div class="footer">
Data Analytics & Visualization Lab | Machine Learning Model Deployment
</div>

</body>

</html>
